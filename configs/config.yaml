# Cow Re-Identification (Video-Based): Configuration v2
# ======================================================
# Split: 15 train / 6 val / 10 test cows
# Clips: physical 10-second MP4 files on /local1 (6.6 TB free)
# Val & Test use the same re-ID protocol: first clip = query, rest = gallery

data:
  video_dir:     "/home/hswts124607/cow_videos"
  clips_dir:     "/home/hswts124607/cow_clips" # physical 10s clips (~400 MB total)
  processed_dir: "./data/processed"

  num_train_cows: 15
  num_val_cows:    6
  # test = remaining cows (31 - 15 - 6 = 10)
  random_seed: 42

  clip_seconds: 10.0          # each clip is exactly this many seconds
  clip_frames:  16            # frames uniformly sampled per clip for the model
  target_size:  [224, 224]

# ── Models ──────────────────────────────────────────────────────────────────
model:
  embedding_dim: 512

  c3d:
    pretrained:      true     # tries Sports-1M; falls back to random init
    freeze_backbone: false
    dropout_rate:    0.5

  x3d:
    model_size:      "M"      # xs | s | M | l
    pretrained:      true     # Kinetics-400 (ImageNet-pretrained backbone)
    freeze_backbone: false
    dropout_rate:    0.5

  swin:
    model_name:      "swin3d_t"   # swin3d_t | swin3d_s | swin3d_b
    pretrained:      true         # Kinetics-400 (ImageNet-22K backbone)
    freeze_backbone: false
    dropout_rate:    0.1

  vivit:
    image_model:     "vit_base_patch16_224"  # timm base for weight inflation
    num_frames:      16
    tubelet_size:    2
    pretrained:      true         # ImageNet-21K ViT-B/16 inflated to video
    freeze_backbone: false
    dropout_rate:    0.1

# ── Training defaults (overridden by HPO best params for final run) ──────────
training:
  batch_size:               8
  num_epochs:               50
  learning_rate:            0.0001
  weight_decay:             0.0001
  optimizer:                "adamw"
  scheduler:                "cosine"
  warmup_epochs:            3
  loss:                     "triplet"
  triplet_margin:           0.3
  P:                        4       # identities per batch
  K:                        2       # clips per identity  (batch_size = P*K)
  batches_per_epoch:        30      # gradient steps per epoch (repeat-samples for small data)
  early_stopping_patience:  5       # epochs without val improvement before stopping
  device:                   "cuda"

# ── Hyperparameter optimisation (Optuna) ─────────────────────────────────────
hpo:
  n_trials:               30
  max_epochs_per_trial:   20
  pruner_startup_trials:  5
  pruner_warmup_steps:    3
  # Search space
  lr_min:               0.00001
  lr_max:               0.001
  wd_min:               0.00001
  wd_max:               0.001
  dropout_choices:      [0.1, 0.2, 0.3, 0.5]
  margin_min:           0.1
  margin_max:           0.5
  P_choices:            [4, 8]
  K_choices:            [2, 4]
  embed_dim_choices:    [256, 512]

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  train:
    horizontal_flip:  0.5
    color_jitter:     0.3   # brightness/contrast/saturation
    random_rotation:  10
    temporal_jitter:  true  # random start frame within clip
  eval:
    center_crop: true       # deterministic, no augmentation

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  metrics:    ["cmc", "map"]
  cmc_ranks:  [1, 5, 10]

# ── Logging & Checkpoints ─────────────────────────────────────────────────────
logging:
  log_dir:        "./logs"
  checkpoint_dir: "./checkpoints"
  results_dir:    "./results"
  use_wandb:      true
  wandb_project:  "cow-reid"
  wandb_entity:   "helix_sommer-weihenstephan-triesdorf-university-of-appli"

# ── Which models to run ───────────────────────────────────────────────────────
experiment:
  models_to_run:
    c3d:   true
    x3d:   true
    swin:  true
    vivit: true
